<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <form action="http://localhost:8080/servlet_study_war_exploded/api/html/form" method="post" enctype="multipart/form-data">
            <div>
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" autofocus placeholder="사용자이름을 입력하세요" required>
            </div>
            <div>
                <label for="password">비밀번호</label>
                <input type="password" id="password" name = "password" value="1234" required>
            </div>
            <div>
                <label for="student1">학생</label>
                <input type="checkbox" id="student1" name="job1" value="학생1">
                <label for="teacher1">선생님</label>
                <input type="checkbox" id="teacher1" name="job1" value="선생님1" disabled>
                <label for="dev1">개발자</label>
                <input type="checkbox" id="dev1" name="job1"value="개발자1">
            </div>
            
            <div>
                <label for="student">학생</label>
                <input type="radio" id="student" name="job"  value="학생">
                <label for="teacher">선생님</label>
                <input type="radio" id="teacher" name="job"  value="선생님">
                <label for="dev">개발자</label>
                <input type="radio" id="dev" name="job"  value="개발자">
            </div>

            <div>
                <label for="profileFile">첨부파일</label>
                <input type="file" id="profileFile" name="profileFile">
            </div>
            <div>
               <textarea name="" id=""></textarea> 
            </div>
            <div>
                <select name="" id="">
                    <optgroup label="선택목록1">
                        <option value="">그룹1</option>
                        <option value="">그룹2</option>
                        <option value="">그룹3</option>
                    </optgroup>
                    <optgroup label="선택목록2">
                        <option value="">그룹4</option>
                        <option value="">그룹5</option>
                        <option value="">그룹6</option>
                    </optgroup>
                </select>
            </div>
            <div>
                <input type="text" list="nameList">
                <datalist id="nameList">
                    <option value="권민주">권민주</option>
                    <option value="권당주">권당주</option>
                    <option value="권주">권주</option>
                    <option value="권고">권고</option>
                </datalist>
            </div>
            <button type="submit">전송</button>
            <button type="button" disabled>확인</button>
            <button type="button">열기</button>
        </form>
    </body>
</html>
