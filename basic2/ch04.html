<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
        .box {
            width : 100px;
            height: 100px;
            background-color: black;
        } 
        .box2 {
            /* 공개 할당 자체가 100이된다 (글자 위아래 다 합쳐서 ) 단 색깔은 불가능 영역만 차지 */
            line-height: 100px;
            /* laout의 형태를 바꿔준다 */
            display: inline-block;
            width : 100px;
            height: 100px;
            background-color: gray;
        } 
         /* 블록은 너비를 100로 가진다 */
        .box3 {
            width: 300px;
            height: 200px;
            background-color: skyblue;
        }
        .box3-1 {
            /* 부모가 기준이 된다  */
            width: 70%;
            height: 50%;
            background-color: greenyellow;

        }
        .box3-2 {
            width: 100%;
            height: 50%;
            background-color: pink;
        }

        </style>
        
    </head>
    <body>
        <div class="box"></div>
        <label class="box2">글자1</label>
        <label class="box2">글자2</label>
        <div class="box3">
            <div class="box3-1">
                <div class="box3-2"></div>
            </div>
        </div>
    </body>
</html>
